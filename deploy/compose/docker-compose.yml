# Local full-stack for development only. Not a production topology.
# Production zones are defined in infra/ and docs/architecture/03-deployment.md.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ikip
      POSTGRES_USER: ikip_app
      POSTGRES_PASSWORD: localdev   # local only; never a real secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  objectstore:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: localdev
      MINIO_ROOT_PASSWORD: localdevsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - objdata:/data

  # Processing queue is implementation-neutral (C4 assumption). Redis shown for local dev.
  queue:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  objdata:
