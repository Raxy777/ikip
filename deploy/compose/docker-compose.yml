# Secure-conscious local prototype topology. Dev-header identity is intentionally NOT production auth.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_DB: ikip, POSTGRES_USER: ikip_app, POSTGRES_PASSWORD: localdev }
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: { test: [CMD-SHELL, "pg_isready -U ikip_app -d ikip"], interval: 5s, timeout: 3s, retries: 20 }

  objectstore:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment: { MINIO_ROOT_USER: localdev, MINIO_ROOT_PASSWORD: localdevsecret }
    volumes: [objdata:/data]
    ports: ["9001:9001"]
    # Do not use `mc` here: it is not included in the minio server image.
    # The initializer below polls the S3 API and is the readiness gate for the API.

  create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on: [objectstore]
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        for attempt in $$(seq 1 30); do
          if mc alias set local http://objectstore:9000 localdev localdevsecret &&
             mc mb --ignore-existing local/ikip-originals; then
            exit 0
          fi
          sleep 2
        done
        echo "MinIO did not become ready in 60 seconds" >&2
        exit 1

  api:
    build: { context: ../.., dockerfile: deploy/docker/api.Dockerfile }
    environment:
      IKIP_ENV: development
      IKIP_DEV_AUTH: "1"
      IKIP_STORAGE_PROFILE: durable
      IKIP_DATABASE_URL: postgresql://ikip_app:localdev@postgres:5432/ikip
      IKIP_OBJECT_ENDPOINT: http://objectstore:9000
      IKIP_OBJECT_BUCKET: ikip-originals
      IKIP_OBJECT_ACCESS_KEY: localdev
      IKIP_OBJECT_SECRET_KEY: localdevsecret
      IKIP_UPLOAD_MAX_BYTES: "52428800"
      IKIP_PDF_MAX_PAGES: "200"
      IKIP_PDF_MAX_EXTRACTED_TEXT_CHARS: "2000000"
      IKIP_PDF_MAX_CHUNKS: "2000"
    depends_on:
      postgres: { condition: service_healthy }
      create-bucket: { condition: service_completed_successfully }
    healthcheck: { test: [CMD, "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"], interval: 10s, timeout: 3s, retries: 20 }

  web:
    build: { context: ../.., dockerfile: deploy/docker/web.Dockerfile }
    ports: ["8080:8080"]
    depends_on: { api: { condition: service_healthy } }

volumes: { pgdata: {}, objdata: {} }
