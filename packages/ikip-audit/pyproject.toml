[project]
name = "ikip-audit"
version = "0.0.0"
description = "Central redaction rules and append-only audit emission. No service logs restricted content or secrets independently."
requires-python = ">=3.12"
dependencies = ["ikip-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ikip_audit"]
