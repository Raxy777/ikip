[project]
name = "ikip-provenance"
version = "0.0.0"
description = "Lineage, processing versions, and checksums. Enables reproduction, correction propagation, and deletion enumeration."
requires-python = ">=3.12"
dependencies = ["ikip-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ikip_provenance"]
