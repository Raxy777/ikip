[project]
name = "ikip-authz"
version = "0.0.0"
description = "Deny-by-default authorization for the Industrial Knowledge Intelligence Platform. The ONLY place authorization is decided."
requires-python = ">=3.12"
dependencies = ["ikip-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ikip_authz"]
