[project]
name = "ikip-statements"
version = "0.0.0"
description = "Statement classification and claim-support validation. Prevents conflating recommendation, approved procedure, completed work, observation, and inference."
requires-python = ">=3.12"
dependencies = ["ikip-contracts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ikip_statements"]
