[project]
name = "ikip-contracts"
version = "0.0.0"
description = "Generated + hand-written models from contracts/. Single source of truth for platform data shapes."
requires-python = ">=3.12"
dependencies = ["pydantic>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ikip_contracts"]
